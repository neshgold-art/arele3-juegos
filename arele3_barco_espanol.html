<!DOCTYPE html>
<html lang="yi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לאָמיר זוכן — Árele 3</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#fff;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:12px;}
  .canvas-wrap{position:relative;width:100%;max-width:900px;margin:0 auto;}
  canvas{display:block;width:100%;border-radius:8px;border:2.5px solid #2eaa2e;background:#fff;cursor:crosshair;touch-action:none;}
  .dot-label{position:absolute;transform:translate(-50%,-50%);font-family:Arial,sans-serif;font-size:13px;font-weight:400;color:#1a1a1a;cursor:pointer;user-select:none;text-align:center;line-height:1;}
  .dot-label .dot{display:block;width:4px;height:4px;border-radius:50%;background:#999;margin:0 auto 2px auto;}
  .dot-label.done{color:var(--ink);} .dot-label.done .dot{background:var(--ink);}
  .dot-label.next{color:#534AB7;font-weight:500;} .dot-label.next .dot{background:#534AB7;}
  .msg{font-size:13px;margin-top:8px;min-height:18px;color:#888;text-align:center;}
  .msg.win{color:#0F6E56;font-weight:500;}
</style>
</head>
<body>
<div class="canvas-wrap" id="wrap">
  <canvas id="gc" width="900" height="680"></canvas>
</div>
<p class="msg" id="msg">¡Toca <strong>1</strong> para empezar!</p>
<script>
const W=900,H=680,CX=500,PEAK_Y=115,HULL_Y=415,WATER_Y=450;
function lerp(a,b,t){return a+(b-a)*t;}
const P1={x:820,y:WATER_Y},P2={x:850,y:HULL_Y};
const pts39=[];
for(let i=0;i<7;i++){const t=(i+1)/8;pts39.push({x:lerp(820,CX,t),y:lerp(HULL_Y,PEAK_Y,t)});}
const P10={x:CX,y:PEAK_Y};
const pts1117=[];
for(let i=0;i<7;i++){const t=(i+1)/8;pts1117.push({x:lerp(CX,180,t),y:lerp(PEAK_Y,HULL_Y,t)});}
const P18={x:150,y:HULL_Y},P19={x:180,y:WATER_Y},P20={x:790,y:WATER_Y};
const P=[P1,P2,...pts39,P10,...pts1117,P18,P19,P20];
let inkColor='#1D9E75',next=1,drawn=[],won=false;
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d'),msgEl=document.getElementById('msg'),wrap=document.getElementById('wrap');
const labels=[];
P.forEach((p,i)=>{
  const el=document.createElement('div');
  el.className='dot-label';
  el.innerHTML=`<span class="dot"></span>${i+1}`;
  if(i===9){el.dataset.ox=0;el.dataset.oy=-28;}else{el.dataset.ox=0;el.dataset.oy=0;}
  el.addEventListener('click',()=>handleTap(i+1));
  el.addEventListener('touchstart',(e)=>{e.preventDefault();handleTap(i+1);},{passive:false});
  wrap.appendChild(el);labels.push(el);
});
function positionLabels(){
  const rect=canvas.getBoundingClientRect(),wRect=wrap.getBoundingClientRect();
  const sx=rect.width/W,sy=rect.height/H;
  P.forEach((p,i)=>{
    const ox=parseFloat(labels[i].dataset.ox)||0,oy=parseFloat(labels[i].dataset.oy)||0;
    labels[i].style.left=((p.x*sx)+(rect.left-wRect.left)+ox)+'px';
    labels[i].style.top=((p.y*sy)+(rect.top-wRect.top)+oy)+'px';
    labels[i].style.setProperty('--ink',inkColor);
  });
}
function updateLabels(){
  labels.forEach((el,i)=>{
    const n=i+1,done=drawn.includes(n),isNext=n===next&&!won;
    el.className='dot-label'+(done?' done':isNext?' next':'');
    el.style.setProperty('--ink',inkColor);
    el.style.color=done?inkColor:isNext?'#534AB7':'#1a1a1a';
    el.querySelector('.dot').style.background=done?inkColor:isNext?'#534AB7':'#999';
  });
}
function drawStatic(){
  ctx.save();
  ctx.strokeStyle='#2eaa2e';ctx.lineWidth=3;ctx.strokeRect(4,4,W-8,H-8);
  ctx.fillStyle='#1a1a1a';ctx.font='22px Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('לאָמיר זוכן.',CX,14);
  ctx.strokeStyle='#1a1a1a';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(CX-7,HULL_Y);ctx.bezierCurveTo(CX-10,300,CX-8,185,CX,PEAK_Y+18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX+7,HULL_Y);ctx.bezierCurveTo(CX+10,300,CX+8,185,CX,PEAK_Y+18);ctx.stroke();
  ctx.lineWidth=1.5;ctx.save();ctx.translate(CX,PEAK_Y);ctx.beginPath();
  for(let i=0;i<5;i++){const outer=((i*2)*Math.PI/5)-Math.PI/2,inner=((i*2+1)*Math.PI/5)-Math.PI/2;if(i===0)ctx.moveTo(Math.cos(outer)*15,Math.sin(outer)*15);else ctx.lineTo(Math.cos(outer)*15,Math.sin(outer)*15);ctx.lineTo(Math.cos(inner)*6,Math.sin(inner)*6);}
  ctx.closePath();ctx.stroke();ctx.restore();
  ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(148,HULL_Y);ctx.lineTo(855,HULL_Y);ctx.stroke();
  ctx.lineWidth=0.7;
  for(let x=158;x<850;x+=10){ctx.beginPath();ctx.moveTo(x,HULL_Y);ctx.lineTo(x-5,HULL_Y+28);ctx.stroke();}
  ctx.lineWidth=1.5;
  [462,482,502].forEach(y=>{ctx.beginPath();ctx.moveTo(10,y);for(let x=10;x<890;x+=140){ctx.bezierCurveTo(x+35,y-13,x+70,y+13,x+140,y);}ctx.stroke();});
  ctx.fillStyle='#1a1a1a';ctx.font='22px Arial,sans-serif';ctx.direction='rtl';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText('וואָס האָסטו געפֿונען?',W-20,526);
  ctx.fillText('–א שלייף, א שערל, א שירעם, א שיף.',W-20,564);
  const colors=['#1D9E75','#534AB7','#c0392b','#E8A020','#1a6fad','#1a1a1a'];
  const btnY=612,startX=320,gap=48;
  colors.forEach((c,i)=>{const bx=startX+i*gap;ctx.beginPath();ctx.arc(bx,btnY,16,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle=c===inkColor?'#333':'#ccc';ctx.lineWidth=2;ctx.stroke();});
  ctx.fillStyle='#1a1a1a';ctx.font='13px Arial,sans-serif';ctx.textAlign='center';ctx.direction='ltr';
  ctx.fillText('\u21BA \u05D0\u05B8\u05E0\u05D4\u05D9\u05D9\u05D1',90,605);
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.strokeRect(30,592,120,26);
  ctx.restore();
}
function drawLines(){
  if(drawn.length<2)return;
  ctx.save();ctx.strokeStyle=inkColor;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(P[drawn[0]-1].x,P[drawn[0]-1].y);
  for(let i=1;i<drawn.length;i++)ctx.lineTo(P[drawn[i]-1].x,P[drawn[i]-1].y);
  if(won)ctx.lineTo(P[0].x,P[0].y);
  ctx.stroke();ctx.restore();
}
function render(){ctx.clearRect(0,0,W,H);drawStatic();drawLines();positionLabels();updateLabels();}
function handleTap(n){
  if(won||n!==next)return;drawn.push(next);
  if(next===20){won=true;msgEl.innerHTML='⛵ !סוף — ?וואָס האָסטו געפֿונען';msgEl.className='msg win';}
  else{next++;msgEl.innerHTML=`¡Muy bien! Ahora toca <strong>${next}</strong>`;}
  render();
}
canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect(),sx=W/rect.width,sy=H/rect.height;
  const cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;
  ['#1D9E75','#534AB7','#c0392b','#E8A020','#1a6fad','#1a1a1a'].forEach((c,i)=>{
    const bx=320+i*48;if(Math.sqrt((cx-bx)**2+(cy-612)**2)<=20){inkColor=c;updateLabels();render();}
  });
  if(cx>=30&&cx<=150&&cy>=592&&cy<=618)resetGame();
});
canvas.addEventListener('touchstart',(e)=>{
  const rect=canvas.getBoundingClientRect(),sx=W/rect.width,sy=H/rect.height;
  const t=e.touches[0],cx=(t.clientX-rect.left)*sx,cy=(t.clientY-rect.top)*sy;
  ['#1D9E75','#534AB7','#c0392b','#E8A020','#1a6fad','#1a1a1a'].forEach((c,i)=>{
    const bx=320+i*48;if(Math.sqrt((cx-bx)**2+(cy-612)**2)<=24){inkColor=c;updateLabels();render();}
  });
  if(cx>=30&&cx<=150&&cy>=592&&cy<=618)resetGame();
},{passive:true});
function resetGame(){next=1;drawn=[];won=false;msgEl.innerHTML='¡Toca <strong>1</strong> para empezar!';msgEl.className='msg';render();}
window.addEventListener('resize',positionLabels);
render();
</script>
</body>
</html>
