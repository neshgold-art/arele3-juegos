<script>
const msgEl=document.getElementById('msg');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');

const OBJECTS=[
  {id:'sher_open', correct:'open',   x:0.891, y:0.518, label:'שערעלע'},
  {id:'kestl_open', correct:'open',   x:0.758, y:0.598, label:'קעסטל'},
  {id:'fentster_open', correct:'open',   x:0.865, y:0.876, label:'פֿענצטער'},
  {id:'shirem_open', correct:'open',   x:0.714, y:0.818, label:'שירעם'},
  {id:'oygn_open', correct:'open',   x:0.479, y:0.835, label:'אויגן'},
  {id:'shafe_open', correct:'open',   x:0.638, y:0.578, label:'שאַפֿע'},
  {id:'bukh_open', correct:'open',   x:0.374, y:0.488, label:'בוך'},
  {id:'sher_closed', correct:'closed', x:0.564, y:0.669, label:'שערעלע'},
  {id:'shafe_closed', correct:'closed', x:0.477, y:0.702, label:'שאַפֿע'},
  {id:'bukh_closed', correct:'closed', x:0.383, y:0.837, label:'בוך'},
  {id:'oygn_closed', correct:'closed', x:0.198, y:0.839, label:'אויגן'},
  {id:'kestl_closed', correct:'closed', x:0.148, y:0.690, label:'קעסטל'},
  {id:'shirem_closed', correct:'closed', x:0.279, y:0.643, label:'שירעם'},
  {id:'shafe2_closed', correct:'closed', x:0.233, y:0.443, label:'שאַפֿע'}
];

const TARGETS=[
  {id:'open',   label:'אָפֿן',      x:0.726, y:0.355, color:'#E8A020'},
  {id:'closed', label:'פֿאַרמאַכט', x:0.312, y:0.355, color:'#e63030'},
];

let W,H,dragging=null,connected={},correctCount=0;
const totalObjects=OBJECTS.length;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  render();
}
function px(fx,fy){return {x:fx*W,y:fy*H};}

function render(){
  ctx.clearRect(0,0,W,H);

  // Connected lines
  OBJECTS.forEach(obj=>{
    if(!connected[obj.id])return;
    const op=px(obj.x,obj.y);
    const tgt=TARGETS.find(t=>t.id===obj.correct);
    const tp=px(tgt.x,tgt.y);
    ctx.save();ctx.beginPath();ctx.moveTo(op.x,op.y);ctx.lineTo(tp.x,tp.y);
    ctx.strokeStyle=tgt.color;ctx.lineWidth=2.5;ctx.stroke();ctx.restore();
  });

  // Dragging line
  if(dragging){
    const src=TARGETS.find(t=>t.id===dragging.targetId);
    if(src){
      const sp=px(src.x,src.y);
      ctx.save();ctx.beginPath();ctx.moveTo(sp.x,sp.y);
      ctx.lineTo(dragging.curX,dragging.curY);
      ctx.strokeStyle=src.color;ctx.lineWidth=2.5;
      ctx.setLineDash([6,4]);ctx.stroke();ctx.restore();
    }
  }

  // Target circles
  TARGETS.forEach(t=>{
    const p=px(t.x,t.y);
    ctx.save();
    ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.fillStyle=t.color;
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
  });

  // Object dots
  OBJECTS.forEach(obj=>{
    const p=px(obj.x,obj.y);
    const isDone=connected[obj.id];
    const color=isDone?TARGETS.find(t=>t.id===obj.correct).color:'rgba(80,80,80,0.8)';
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();ctx.restore();
  });
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left,y:cl.clientY-rect.top};
}
function hitTarget(x,y){
  for(const t of TARGETS){
    const p=px(t.x,t.y);
    if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<20)return t;
  }
  return null;
}
function hitObject(x,y){
  for(const obj of OBJECTS){
    if(connected[obj.id])continue;
    const p=px(obj.x,obj.y);
    if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<35)return obj;
  }
  return null;
}
function startDrag(x,y){
  const t=hitTarget(x,y);
  if(t){dragging={targetId:t.id,curX:x,curY:y};render();}
}
function moveDrag(x,y){if(!dragging)return;dragging.curX=x;dragging.curY=y;render();}
function endDrag(x,y){
  if(!dragging)return;
  const obj=hitObject(x,y);
  if(obj){
    if(obj.correct===dragging.targetId){
      connected[obj.id]=true;correctCount++;
      if(correctCount===totalObjects){msgEl.innerHTML='🎉 !סוף You matched them all!';msgEl.className='msg win';}
      else{msgEl.textContent='Great!';msgEl.className='msg';}
    }else{
      msgEl.textContent='Try again!';msgEl.className='msg wrong';
    }
  }
  dragging=null;render();
}
cv.addEventListener('mousedown',e=>{const p=getPos(e);startDrag(p.x,p.y);});
cv.addEventListener('mousemove',e=>{const p=getPos(e);moveDrag(p.x,p.y);});
cv.addEventListener('mouseup',e=>{const p=getPos(e);endDrag(p.x,p.y);});
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);startDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);moveDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();endDrag(t.clientX-rect.left,t.clientY-rect.top);},{passive:false});
function resetGame(){
  Object.keys(connected).forEach(k=>delete connected[k]);
  correctCount=0;dragging=null;
  msgEl.textContent='Tap אָפֿן or פֿאַרמאַכט and drag to the correct object';msgEl.className='msg';render();
}
bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete)resize();
</script>
</body>
