<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const confettiCanvas=document.getElementById('confetti');
const cctx=confettiCanvas.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');
const msgEl=document.getElementById('msg');

const DOTS=[
  {n:1, x:0.597, y:0.664},
  {n:2, x:0.648, y:0.615},
  {n:3, x:0.645, y:0.593},
  {n:4, x:0.614, y:0.494},
  {n:5, x:0.593, y:0.416},
  {n:6, x:0.564, y:0.320},
  {n:7, x:0.552, y:0.277},
  {n:8, x:0.550, y:0.190},
  {n:9, x:0.514, y:0.204},
  {n:10, x:0.474, y:0.218},
  {n:11, x:0.516, y:0.239},
  {n:12, x:0.541, y:0.228},
  {n:13, x:0.502, y:0.320},
  {n:14, x:0.462, y:0.402},
  {n:15, x:0.425, y:0.472},
  {n:16, x:0.377, y:0.572},
  {n:17, x:0.541, y:0.574},
  {n:18, x:0.515, y:0.601},
  {n:19, x:0.373, y:0.616},
  {n:20, x:0.388, y:0.667}
];
const WORDS=[
  {id:'shleyf', correct:false, x1:0.735, y1:0.833, x2:0.898, y2:0.892},
  {id:'sherl',  correct:false, x1:0.557, y1:0.833, x2:0.716, y2:0.892},
  {id:'shirem', correct:false, x1:0.367, y1:0.833, x2:0.542, y2:0.892},
  {id:'shif',   correct:true,  x1:0.197, y1:0.833, x2:0.352, y2:0.892}
];
const DRAW_ZONE=0.79; // debajo de esta fraccion se dibuja con lapiz

let W,H,nextN=1,done=false;
let confettiPieces=[],confettiAnim=null;
let strokes=[],curStroke=null,circled=false;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  confettiCanvas.width=W; confettiCanvas.height=H;
  render();
}
function px(d){return {x:d.x*W,y:d.y*H};}

function render(){
  ctx.clearRect(0,0,W,H);
  // Lineas rectas del barco
  ctx.save();
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(let i=0;i<nextN-1;i++){
    const p=px(DOTS[i]);
    if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
  }
  ctx.stroke();ctx.restore();
  // Puntos
  DOTS.forEach(d=>{
    const p=px(d);
    const isDone=d.n<nextN;
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,isDone?6:5,0,Math.PI*2);
    ctx.fillStyle=isDone?'#2eaa2e':'rgba(34,85,204,0.5)';
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.stroke();
    ctx.restore();
  });
  // Trazos del lapiz (circulo de respuesta)
  ctx.save();
  ctx.strokeStyle='#e63030';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  const all=curStroke?strokes.concat([curStroke]):strokes;
  all.forEach(s=>{
    if(s.length<2)return;
    ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);
    for(let i=1;i<s.length;i++)ctx.lineTo(s[i].x,s[i].y);
    ctx.stroke();
  });
  ctx.restore();
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left,y:cl.clientY-rect.top};
}

// --- Puntos 1 al 20 ---
function handleTap(x,y){
  if(done)return;
  const R=22;
  const expected=DOTS[nextN-1];
  const ep=px(expected);
  let hit=null;
  if(Math.sqrt((x-ep.x)**2+(y-ep.y)**2)<R){
    hit=expected;
  } else {
    let best=1e9;
    for(const d of DOTS){
      const p=px(d);
      const dist=Math.sqrt((x-p.x)**2+(y-p.y)**2);
      if(dist<R&&dist<best){best=dist;hit=d;}
    }
  }
  if(!hit)return;
  if(hit.n===nextN){
    nextN++;
    if(nextN>DOTS.length){
      done=true;
      msgEl.innerHTML='🎉 !סוף Ahora encierra la respuesta correcta';
      msgEl.className='msg win';
      launchConfetti();
      playWinSound();
    }else{
      msgEl.textContent='¡Muy bien!';
      msgEl.className='msg';
    }
  }else if(hit.n>=nextN){
    msgEl.textContent='¡Ese no! Busca el número que sigue';
    msgEl.className='msg wrong';
  }
  render();
}

// --- Lapiz para encerrar la respuesta ---
function evalStroke(s){
  if(s.length<8)return;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  s.forEach(p=>{
    if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y;
  });
  let found=null;
  for(const w of WORDS){
    const cx=(w.x1+w.x2)/2*W, cy=(w.y1+w.y2)/2*H;
    if(cx>minX&&cx<maxX&&cy>minY&&cy<maxY){found=w;break;}
  }
  if(!found)return;
  if(found.correct){
    circled=true;
    msgEl.innerHTML='⛵ !מצוין ¡Es un barco!';
    msgEl.className='msg win';
    launchConfetti();
    playWinSound();
  }else{
    msgEl.textContent='¡Esa no es! Intenta otra vez';
    msgEl.className='msg wrong';
    setTimeout(()=>{
      strokes=strokes.filter(st=>st!==s);
      render();
    },800);
  }
}

function pointerDown(x,y){
  if(y/H>DRAW_ZONE){
    curStroke=[{x,y}];
  }else{
    handleTap(x,y);
  }
}
function pointerMove(x,y){
  if(!curStroke)return;
  curStroke.push({x,y});
  render();
}
function pointerUp(){
  if(!curStroke)return;
  const s=curStroke;
  strokes.push(s);
  curStroke=null;
  render();
  evalStroke(s);
}

cv.addEventListener('mousedown',e=>{const p=getPos(e);pointerDown(p.x,p.y);});
cv.addEventListener('mousemove',e=>{const p=getPos(e);pointerMove(p.x,p.y);});
cv.addEventListener('mouseup',()=>pointerUp());
cv.addEventListener('mouseleave',()=>pointerUp());
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);pointerDown(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);pointerMove(p.x,p.y);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();pointerUp();},{passive:false});

function launchConfetti(){
  confettiPieces=[];
  for(let i=0;i<150;i++){
    confettiPieces.push({
      x:Math.random()*W, y:-20-Math.random()*H*0.5,
      w:8+Math.random()*8, h:4+Math.random()*4,
      color:['#e63030','#2eaa2e','#2255cc','#f57c00','#9c27b0','#f5c800','#f06090','#00bcd4'][Math.floor(Math.random()*8)],
      angle:Math.random()*360, spin:(Math.random()-0.5)*8,
      vx:(Math.random()-0.5)*4, vy:3+Math.random()*5, opacity:1
    });
  }
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  animateConfetti();
}
function animateConfetti(){
  cctx.clearRect(0,0,W,H);
  let alive=false;
  confettiPieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;
    if(p.y<H)alive=true;
    if(p.opacity>0&&p.y<H+20){
      cctx.save();cctx.globalAlpha=Math.max(0,p.opacity);
      cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);
      cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cctx.restore();
    }
  });
  if(alive)confettiAnim=requestAnimationFrame(animateConfetti);
  else cctx.clearRect(0,0,W,H);
}
function playWinSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0.3,ac.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.15+0.35);
      osc.start(ac.currentTime+i*0.15);
      osc.stop(ac.currentTime+i*0.15+0.35);
    });
  }catch(e){}
}

function resetGame(){
  nextN=1;done=false;circled=false;
  strokes=[];curStroke=null;
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  cctx.clearRect(0,0,W,H);
  msgEl.textContent='Toca los puntos en orden del 1 al 20';
  msgEl.className='msg';
  render();
}

bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete)resize();
</script>
