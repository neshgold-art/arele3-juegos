  <canvas class="overlay" id="cv"></canvas>
  <input type="text" id="answer" autocomplete="off"/>
  <canvas id="confetti"></canvas>
</div>
<p class="msg" id="msg">Tap the dots in order: from איינס (1) to צען (10)</p>
<button class="br" onclick="resetGame()">↺ Start over</button>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const confettiCanvas=document.getElementById('confetti');
const cctx=confettiCanvas.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');
const msgEl=document.getElementById('msg');
const answerEl=document.getElementById('answer');

const DOTS=[
  {n:1,  x:0.619, y:0.338},
  {n:2,  x:0.473, y:0.186},
  {n:3,  x:0.326, y:0.340},
  {n:4,  x:0.320, y:0.441},
  {n:5,  x:0.352, y:0.531},
  {n:6,  x:0.410, y:0.604},
  {n:7,  x:0.482, y:0.642},
  {n:8,  x:0.554, y:0.608},
  {n:9,  x:0.602, y:0.536},
  {n:10, x:0.627, y:0.433}
];
let W,H,nextN=1,done=false;
let confettiPieces=[],confettiAnim=null;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  confettiCanvas.width=W; confettiCanvas.height=H;
  render();
}
function px(d){return {x:d.x*W,y:d.y*H};}

function render(){
  ctx.clearRect(0,0,W,H);
  // Black lines between connected dots
  ctx.save();
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  const pts=[];
  for(let i=0;i<nextN-1;i++)pts.push(px(DOTS[i]));
  // Sombrero: lineas RECTAS del 1 al 2 y del 2 al 3
  if(pts.length>=2){
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    ctx.lineTo(pts[1].x,pts[1].y);
    if(pts.length>=3)ctx.lineTo(pts[2].x,pts[2].y);
    ctx.stroke();
  }
  // Cara: curva suave del 3 en adelante
  if(pts.length>3){
    const c=pts.slice(2);
    ctx.beginPath();ctx.moveTo(c[0].x,c[0].y);
    for(let i=0;i<c.length-1;i++){
      const p0=c[Math.max(i-1,0)],p1=c[i],p2=c[i+1],p3=c[Math.min(i+2,c.length-1)];
      const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
      const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
    }
    ctx.stroke();
  }
  ctx.restore();
  // Dots
  DOTS.forEach(d=>{
    const p=px(d);
    const isDone=d.n<nextN;
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,isDone?7:6,0,Math.PI*2);
    ctx.fillStyle=isDone?'#2eaa2e':'rgba(34,85,204,0.55)';
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
  });
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left,y:cl.clientY-rect.top};
}

function handleTap(x,y){
  if(done)return;
  for(const d of DOTS){
    const p=px(d);
    if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<24){
      if(d.n===nextN){
        nextN++;
        if(nextN>DOTS.length){
          done=true;
          msgEl.innerHTML='🎉 !סוף You found the clown!';
          msgEl.className='msg win';
          launchConfetti();
          playWinSound();
        }else{
          msgEl.textContent='Great!';
          msgEl.className='msg';
        }
      }else if(d.n>=nextN){
        msgEl.textContent='Not that one! Find the next number';
        msgEl.className='msg wrong';
      }
      render();
      return;
    }
  }
}

cv.addEventListener('mousedown',e=>{const p=getPos(e);handleTap(p.x,p.y);});
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);handleTap(p.x,p.y);},{passive:false});

function launchConfetti(){
  confettiPieces=[];
  for(let i=0;i<150;i++){
    confettiPieces.push({
      x:Math.random()*W, y:-20-Math.random()*H*0.5,
      w:8+Math.random()*8, h:4+Math.random()*4,
      color:['#e63030','#2eaa2e','#2255cc','#f57c00','#9c27b0','#f5c800','#f06090','#00bcd4'][Math.floor(Math.random()*8)],
      angle:Math.random()*360, spin:(Math.random()-0.5)*8,
      vx:(Math.random()-0.5)*4, vy:3+Math.random()*5, opacity:1
    });
  }
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  animateConfetti();
}
function animateConfetti(){
  cctx.clearRect(0,0,W,H);
  let alive=false;
  confettiPieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;
    if(p.y<H)alive=true;
    if(p.opacity>0&&p.y<H+20){
      cctx.save();cctx.globalAlpha=Math.max(0,p.opacity);
      cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);
      cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cctx.restore();
    }
  });
  if(alive)confettiAnim=requestAnimationFrame(animateConfetti);
  else cctx.clearRect(0,0,W,H);
}
function playWinSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0.3,ac.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.15+0.35);
      osc.start(ac.currentTime+i*0.15);
      osc.stop(ac.currentTime+i*0.15+0.35);
    });
  }catch(e){}
}

function resetGame(){
  nextN=1;done=false;
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  cctx.clearRect(0,0,W,H);
  answerEl.value='';
  msgEl.textContent='Tap the dots in order: from איינס (1) to צען (10)';
  msgEl.className='msg';
  render();
}

bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete)resize();
</script>
