  <canvas class="overlay" id="cv"></canvas>
</div>
<button class="br" onclick="resetGame()">↺ Start over</button>
<p class="msg" id="msg">Drag from the red dot next to the word to the grey dot on the body</p>
<script>
const msgEl=document.getElementById('msg');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');
const PAIRS=[
  {id:'shtern', wx:0.766, wy:0.247, dx:0.572, dy:0.267},
  {id:'oyg', wx:0.811, wy:0.324, dx:0.552, dy:0.302},
  {id:'noz', wx:0.818, wy:0.406, dx:0.584, dy:0.304},
  {id:'moyl', wx:0.805, wy:0.491, dx:0.592, dy:0.350},
  {id:'gambe', wx:0.761, wy:0.574, dx:0.577, dy:0.386},
  {id:'finger', wx:0.761, wy:0.652, dx:0.679, dy:0.473},
  {id:'hant', wx:0.778, wy:0.736, dx:0.635, dy:0.490},
  {id:'boykh', wx:0.811, wy:0.814, dx:0.574, dy:0.558},
  {id:'hor', wx:0.220, wy:0.247, dx:0.470, dy:0.250},
  {id:'oyer', wx:0.245, wy:0.353, dx:0.494, dy:0.326},
  {id:'haldz', wx:0.264, wy:0.466, dx:0.507, dy:0.376},
  {id:'aksl', wx:0.257, wy:0.574, dx:0.505, dy:0.425},
  {id:'pleytse', wx:0.271, wy:0.683, dx:0.462, dy:0.465},
  {id:'fus', wx:0.213, wy:0.789, dx:0.392, dy:0.689},
  {id:'kni', wx:0.475, wy:0.833, dx:0.520, dy:0.747}
];
const COLORS=['#e63030','#2eaa2e','#2255cc','#f57c00','#9c27b0','#00838f','#c2185b','#5d4037','#1a6fad','#8B4513','#534AB7','#c0392b','#E8A020','#006400','#f06090'];
let W,H,dragging=null,connected={},lineColors={},colorIdx=0,correctCount=0;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  render();
}
function px(fx,fy){return {x:fx*W,y:fy*H};}

function render(){
  ctx.clearRect(0,0,W,H);
  PAIRS.forEach(p=>{
    const hasLine=connected[p.id]||(dragging&&dragging.id===p.id);
    if(!hasLine)return;
    const w=px(p.wx,p.wy);
    const d=connected[p.id]?px(p.dx,p.dy):{x:dragging.curX,y:dragging.curY};
    ctx.save();ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(d.x,d.y);
    ctx.strokeStyle=lineColors[p.id]||'#534AB7';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();
  });
  PAIRS.forEach(p=>{
    const d=px(p.dx,p.dy);const isDone=connected[p.id];
    ctx.save();ctx.beginPath();ctx.arc(d.x,d.y,isDone?5:6,0,Math.PI*2);
    ctx.fillStyle=isDone?lineColors[p.id]:'rgba(90,90,90,0.85)';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
  PAIRS.forEach(p=>{
    if(connected[p.id])return;
    const w=px(p.wx,p.wy);const isActive=dragging&&dragging.id===p.id;
    ctx.save();ctx.beginPath();ctx.arc(w.x,w.y,isActive?9:7,0,Math.PI*2);
    ctx.fillStyle=isActive?'#534AB7':'#e63030';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
  const btnW=220,btnH=28,btnX=(W-btnW)/2,btnY=H-40;
  ctx.save();
  ctx.fillStyle='#fff';ctx.strokeStyle='#bbb';ctx.lineWidth=1;
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(btnX,btnY,btnW,btnH,6);else ctx.rect(btnX,btnY,btnW,btnH);
  ctx.fill();ctx.stroke();
  ctx.fillStyle='#1a1a1a';ctx.font='12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('↺ Start over',W/2,btnY+btnH/2);
  ctx.restore();
}
function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left,y:cl.clientY-rect.top};
}
function hitWord(x,y){for(const p of PAIRS){if(connected[p.id])continue;const w=px(p.wx,p.wy);if(Math.sqrt((x-w.x)**2+(y-w.y)**2)<20)return p;}return null;}
function hitDot(x,y){for(const p of PAIRS){if(connected[p.id])continue;const d=px(p.dx,p.dy);if(Math.sqrt((x-d.x)**2+(y-d.y)**2)<25)return p;}return null;}
function hitReset(x,y){const btnW=220,btnH=28,btnX=(W-btnW)/2,btnY=H-40;return x>=btnX&&x<=btnX+btnW&&y>=btnY&&y<=btnY+btnH;}
function startDrag(x,y){if(hitReset(x,y)){resetGame();return;}const p=hitWord(x,y);if(p){dragging={id:p.id,curX:x,curY:y};if(!lineColors[p.id])lineColors[p.id]=COLORS[colorIdx++%COLORS.length];render();}}
function moveDrag(x,y){if(!dragging)return;dragging.curX=x;dragging.curY=y;render();}
function endDrag(x,y){
  if(!dragging)return;
  const target=hitDot(x,y);
  if(target&&target.id===dragging.id){connected[target.id]=true;correctCount++;if(correctCount===PAIRS.length){msgEl.innerHTML='🎉 !סוף You matched them all!';msgEl.className='msg win';}else{msgEl.textContent='Great!';msgEl.className='msg';}}
  else if(target){msgEl.textContent='Try again!';msgEl.className='msg wrong';delete lineColors[dragging.id];colorIdx=Math.max(0,colorIdx-1);}
  else{delete lineColors[dragging.id];colorIdx=Math.max(0,colorIdx-1);}
  dragging=null;render();
}
cv.addEventListener('mousedown',e=>{const p=getPos(e);startDrag(p.x,p.y);});
cv.addEventListener('mousemove',e=>{const p=getPos(e);moveDrag(p.x,p.y);});
cv.addEventListener('mouseup',e=>{const p=getPos(e);endDrag(p.x,p.y);});
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);startDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);moveDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();endDrag(t.clientX-rect.left,t.clientY-rect.top);},{passive:false});
function resetGame(){connected={};lineColors={};dragging=null;colorIdx=0;correctCount=0;msgEl.textContent='Drag from the red dot next to the word to the grey dot on the body';msgEl.className='msg';render();}
bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete)resize();
</script>
