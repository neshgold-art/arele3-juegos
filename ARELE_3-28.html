<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árele 3 – פּאַזשע 28</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    padding: 10px;
  }
  #wrapper {
    width: 1320px;
    max-width: 100%;
    border: 3px solid #c0392b;
    background: white;
  }
  #game-container {
    position: relative;
    width: 100%;
  }
  #bg-image {
    width: 100%;
    display: block;
  }
  #game-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  #answer-input {
    position: absolute;
    font-size: 1.5vw;
    padding: 2px 6px;
    border: none;
    border-bottom: 2px dashed #999;
    background: rgba(255,255,255,0.6);
    direction: rtl;
    outline: none;
    font-family: Arial, sans-serif;
    width: 28%;
  }
  #answer-input:focus { border-bottom-color: #c0392b; background: rgba(255,255,255,0.9); }
  #answer-input.shake {
    animation: shake 0.4s ease;
  }
  #footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 8px 20px;
    direction: ltr;
    border-top: 1px solid #ddd;
  }
  #instructions {
    color: #888;
    font-size: 16px;
  }
  #restart-btn {
    background: none;
    border: none;
    color: #999;
    font-size: 12px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    padding: 2px 6px;
  }
  #restart-btn:hover { color: #c0392b; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="game-container">
    <img id="bg-image" src="ARELE_3-28.jpg" alt="Árele 3 página 28" crossorigin="anonymous">
    <canvas id="game-canvas"></canvas>
    <input type="text" id="answer-input" autocomplete="off">
  </div>
  <div id="footer-row">
    <span id="instructions">Haz clic en cada regalo en orden • Click each gift in order</span>
    <button id="restart-btn">↺ Volver a empezar / Start over</button>
  </div>
</div>

<canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const img = document.getElementById('bg-image');
const answerInput = document.getElementById('answer-input');
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');

const gifts = [
  { name: 'פֿילקע',   label: 'Pelota',   fx: 0.5735, fy: 0.4833 },
  { name: 'פּויק',    label: 'Tambor',   fx: 0.4091, fy: 0.4863 },
  { name: 'פֿאַיאַץ', label: 'Payaso',   fx: 0.2682, fy: 0.4912 },
  { name: 'סאָלדאַט', label: 'Soldado',  fx: 0.1273, fy: 0.4951 },
  { name: 'שיף',     label: 'Barco',    fx: 0.7833, fy: 0.6206 },
  { name: 'באַן',     label: 'Tren',     fx: 0.6288, fy: 0.6304 },
  { name: 'קאַר',     label: 'Coche',    fx: 0.4864, fy: 0.6206 },
  { name: 'קאַליִרן', label: 'Crayolas', fx: 0.1750, fy: 0.6127 },
];

// Position of the answer blank line (fraction of image)
const answerPos = { fx: 0.4902, fy: 0.9382 };

let currentIndex = 0;
let done = false;
const clickRadius = 55;

function resize() {
  const rect = img.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;

  // Position the answer input over the dotted line in the image
  const containerRect = document.getElementById('game-container').getBoundingClientRect();
  const left = answerPos.fx * rect.width;
  const top = answerPos.fy * rect.height;
  answerInput.style.left = left + 'px';
  answerInput.style.top = (top - 14) + 'px';

  draw();
}

function giftPos(g) {
  return { x: g.fx * canvas.width, y: g.fy * canvas.height };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < currentIndex; i++) {
    const p = giftPos(gifts[i]);
    ctx.beginPath();
    ctx.arc(p.x, p.y, clickRadius * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(46, 204, 113, 0.35)';
    ctx.fill();
    ctx.strokeStyle = '#27ae60';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    const r = clickRadius * 0.4;
    ctx.moveTo(p.x - r * 0.5, p.y);
    ctx.lineTo(p.x - r * 0.1, p.y + r * 0.5);
    ctx.lineTo(p.x + r * 0.6, p.y - r * 0.5);
    ctx.stroke();
  }
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(freq, duration = 0.15, type = 'sine', delay = 0) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  const start = audioCtx.currentTime + delay;
  gain.gain.setValueAtTime(0.3, start);
  gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
  osc.start(start);
  osc.stop(start + duration);
}

function playSuccess() {
  playNote(659, 0.12, 'sine', 0);
  playNote(784, 0.12, 'sine', 0.13);
  playNote(1047, 0.18, 'sine', 0.26);
}

function playFanfare() {
  const melody = [523, 659, 784, 1047, 784, 1047, 1175, 1319];
  melody.forEach((freq, i) => playNote(freq, 0.18, 'sine', i * 0.15));
}

function playError() {
  playNote(200, 0.2, 'sawtooth', 0);
  playNote(150, 0.2, 'sawtooth', 0.1);
}

function playAnswerSuccess() {
  playNote(523, 0.15, 'sine', 0);
  playNote(659, 0.15, 'sine', 0.15);
  playNote(784, 0.2, 'sine', 0.3);
}

// --- CONFETTI ---
let confettiParticles = [];

function spawnConfetti(big = false) {
  const count = big ? 180 : 40;
  for (let i = 0; i < count; i++) {
    confettiParticles.push({
      x: Math.random() * confettiCanvas.width,
      y: big ? Math.random() * -100 : Math.random() * confettiCanvas.height * 0.4,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 4,
      color: ['#e74c3c','#f39c12','#2ecc71','#3498db','#9b59b6','#1abc9c'][Math.floor(Math.random()*6)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      life: 1
    });
  }
  animateConfetti();
}

let confettiRunning = false;
function animateConfetti() {
  if (confettiRunning) return;
  confettiRunning = true;
  function step() {
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    confettiParticles = confettiParticles.filter(p => p.life > 0.01);
    confettiParticles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.angle += p.spin;
      p.life -= 0.012;
      confettiCtx.save();
      confettiCtx.globalAlpha = p.life;
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.angle);
      confettiCtx.fillStyle = p.color;
      confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      confettiCtx.restore();
    });
    if (confettiParticles.length > 0) {
      requestAnimationFrame(step);
    } else {
      confettiRunning = false;
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  }
  step();
}

function shakeElement(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
}

// --- CLICK HANDLER ---
canvas.addEventListener('click', (e) => {
  if (done) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  for (let i = 0; i < gifts.length; i++) {
    const p = giftPos(gifts[i]);
    const dist = Math.sqrt((mx - p.x)**2 + (my - p.y)**2);
    if (dist < clickRadius) {
      if (i === currentIndex) {
        currentIndex++;
        if (currentIndex === gifts.length) {
          done = true;
          spawnConfetti(true);
          playFanfare();
          setTimeout(() => { answerInput.focus(); }, 500);
        } else {
          spawnConfetti(false);
          playSuccess();
        }
      } else if (i > currentIndex) {
        playError();
        shakeElement(canvas);
      }
      return;
    }
  }
});

// --- ANSWER INPUT ---
answerInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const val = answerInput.value.trim();
    if (val === '') {
      shakeElement(answerInput);
      playError();
    } else {
      spawnConfetti(false);
      playAnswerSuccess();
      answerInput.style.borderBottomColor = '#27ae60';
      answerInput.style.background = 'rgba(234,250,241,0.9)';
    }
  }
});

// --- RESTART ---
document.getElementById('restart-btn').addEventListener('click', () => {
  currentIndex = 0;
  done = false;
  answerInput.value = '';
  answerInput.style.borderBottomColor = '';
  answerInput.style.background = '';
  confettiParticles = [];
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
});

// --- INIT ---
img.addEventListener('load', () => { resize(); loop(); });
if (img.complete) { resize(); loop(); }
window.addEventListener('resize', resize);
</script>
</body>
</html>
