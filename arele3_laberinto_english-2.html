  <canvas class="overlay" id="cv"></canvas>
  <canvas id="confetti"></canvas>
</div>
<p class="msg" id="msg">Trace the path with your finger or mouse from the children to the house!</p>
<div class="controls">
  <button class="br" onclick="clearCanvas()">↺ Clear</button>
  <span class="size-label">Color:</span>
  <button class="color-btn active" style="background:#e63030" onclick="setColor('#e63030',this)"></button>
  <button class="color-btn" style="background:#2255cc" onclick="setColor('#2255cc',this)"></button>
  <button class="color-btn" style="background:#2eaa2e" onclick="setColor('#2eaa2e',this)"></button>
  <button class="color-btn" style="background:#f57c00" onclick="setColor('#f57c00',this)"></button>
  <button class="color-btn" style="background:#9c27b0" onclick="setColor('#9c27b0',this)"></button>
  <button class="color-btn" style="background:#1a1a1a" onclick="setColor('#1a1a1a',this)"></button>
</div>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const confettiCanvas=document.getElementById('confetti');
const cctx=confettiCanvas.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');
const msgEl=document.getElementById('msg');

let drawing=false, color='#e63030', W, H, reachedHome=false;
let confettiPieces=[], confettiAnim=null;
const HOME_X=0.82, HOME_Y=0.55;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  confettiCanvas.width=W; confettiCanvas.height=H;
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left, y:cl.clientY-rect.top};
}

function setColor(c,btn){
  color=c;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function launchConfetti(){
  confettiPieces=[];
  for(let i=0;i<150;i++){
    confettiPieces.push({
      x: Math.random()*W,
      y: -20 - Math.random()*H*0.5,
      w: 8+Math.random()*8,
      h: 4+Math.random()*4,
      color: ['#e63030','#2eaa2e','#2255cc','#f57c00','#9c27b0','#f5c800','#f06090','#00bcd4'][Math.floor(Math.random()*8)],
      angle: Math.random()*360,
      spin: (Math.random()-0.5)*8,
      vx: (Math.random()-0.5)*4,
      vy: 3+Math.random()*5,
      opacity: 1
    });
  }
  if(confettiAnim) cancelAnimationFrame(confettiAnim);
  animateConfetti();
}

function animateConfetti(){
  cctx.clearRect(0,0,W,H);
  let alive=false;
  confettiPieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin;
    if(p.y < H) alive=true;
    if(p.opacity>0 && p.y<H+20){
      cctx.save();
      cctx.globalAlpha=Math.max(0,p.opacity);
      cctx.translate(p.x,p.y);
      cctx.rotate(p.angle*Math.PI/180);
      cctx.fillStyle=p.color;
      cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cctx.restore();
    }
  });
  if(alive) confettiAnim=requestAnimationFrame(animateConfetti);
  else cctx.clearRect(0,0,W,H);
}

function playWinSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=ac.createOscillator();
      const gain=ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value=freq; osc.type='sine';
      gain.gain.setValueAtTime(0.3,ac.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.15+0.35);
      osc.start(ac.currentTime+i*0.15);
      osc.stop(ac.currentTime+i*0.15+0.35);
    });
  }catch(e){}
}

function checkHome(x,y){
  if(reachedHome) return;
  if(x/W > HOME_X && y/H > HOME_Y){
    reachedHome=true;
    msgEl.innerHTML='🏠 !סוף They made it home!';
    msgEl.className='msg win';
    launchConfetti();
    playWinSound();
  }
}

cv.addEventListener('mousedown',(e)=>{
  drawing=true;
  const p=getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  ctx.strokeStyle=color; ctx.lineWidth=4;
  ctx.lineCap='round'; ctx.lineJoin='round';
});
cv.addEventListener('mousemove',(e)=>{
  if(!drawing) return;
  const p=getPos(e);
  ctx.lineTo(p.x,p.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  checkHome(p.x,p.y);
});
cv.addEventListener('mouseup',()=>{drawing=false;});
cv.addEventListener('mouseleave',()=>{drawing=false;});

cv.addEventListener('touchstart',(e)=>{
  e.preventDefault(); drawing=true;
  const p=getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  ctx.strokeStyle=color; ctx.lineWidth=5;
  ctx.lineCap='round'; ctx.lineJoin='round';
},{passive:false});
cv.addEventListener('touchmove',(e)=>{
  e.preventDefault(); if(!drawing) return;
  const p=getPos(e);
  ctx.lineTo(p.x,p.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  checkHome(p.x,p.y);
},{passive:false});
cv.addEventListener('touchend',()=>{drawing=false;});

function clearCanvas(){
  ctx.clearRect(0,0,W,H);
  cctx.clearRect(0,0,W,H);
  if(confettiAnim) cancelAnimationFrame(confettiAnim);
  reachedHome=false;
  msgEl.textContent='Trace the path with your finger or mouse from the children to the house!';
  msgEl.className='msg';
}

bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete) resize();
</script>
</body>
