<p class="msg" id="msg">Arrastra una línea desde cada oración hasta el objeto correcto</p>
<button class="br" onclick="resetGame()">↺ אָנהייב — Volver a empezar</button>

<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const confettiCanvas=document.getElementById('confetti');
const cctx=confettiCanvas.getContext('2d');
const bgImg=document.getElementById('bgImg');
const wrap=document.getElementById('gameWrap');
const msgEl=document.getElementById('msg');

const SENTENCES=[
  {id:'teeth', x:0.83, y:0.235, match:'brush'},
  {id:'comb',  x:0.83, y:0.420, match:'soap'},
  {id:'dry',   x:0.83, y:0.605, match:'comb'},
  {id:'wash',  x:0.83, y:0.800, match:'towel'}
];
const OBJECTS=[
  {id:'comb',  x:0.21, y:0.255},
  {id:'brush', x:0.21, y:0.430},
  {id:'towel', x:0.21, y:0.620},
  {id:'soap',  x:0.21, y:0.810}
];
const COLORS=['#e63030','#2255cc','#f57c00','#9c27b0'];

let W,H,dragging=null,connected={},lineColors={},colorIdx=0,correctCount=0;
const total=SENTENCES.length;

function resize(){
  const rect=wrap.getBoundingClientRect();
  W=rect.width; H=rect.height;
  cv.width=W; cv.height=H;
  confettiCanvas.width=W; confettiCanvas.height=H;
  render();
}
function px(o){return {x:o.x*W,y:o.y*H};}

function render(){
  ctx.clearRect(0,0,W,H);
  // Connected lines
  SENTENCES.forEach(s=>{
    if(!connected[s.id])return;
    const sp=px(s);
    const obj=OBJECTS.find(o=>o.id===connected[s.id]);
    const op=px(obj);
    ctx.save();ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(op.x,op.y);
    ctx.strokeStyle=lineColors[s.id];ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();ctx.restore();
  });
  // Dragging line
  if(dragging){
    const sp=px(SENTENCES.find(s=>s.id===dragging.id));
    ctx.save();ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(dragging.curX,dragging.curY);
    ctx.strokeStyle=lineColors[dragging.id]||'#888';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.setLineDash([7,5]);ctx.stroke();ctx.restore();
  }
  // Sentence dots (right)
  SENTENCES.forEach(s=>{
    const p=px(s);const isDone=connected[s.id];
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.fillStyle=isDone?lineColors[s.id]:'#e63030';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
  // Object dots (left)
  OBJECTS.forEach(o=>{
    const p=px(o);
    const usedBy=Object.keys(connected).find(k=>connected[k]===o.id);
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.fillStyle=usedBy?lineColors[usedBy]:'rgba(80,80,80,0.7)';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
}

function getPos(e){
  const rect=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return {x:cl.clientX-rect.left,y:cl.clientY-rect.top};
}
function hitSentence(x,y){
  for(const s of SENTENCES){
    if(connected[s.id])continue;
    const p=px(s);
    if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<40)return s;
  }
  return null;
}
function hitObject(x,y){
  for(const o of OBJECTS){
    const p=px(o);
    if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<90)return o;
  }
  return null;
}
function startDrag(x,y){
  const s=hitSentence(x,y);
  if(s){dragging={id:s.id,curX:x,curY:y};if(!lineColors[s.id])lineColors[s.id]=COLORS[colorIdx++%COLORS.length];render();}
}
function moveDrag(x,y){if(!dragging)return;dragging.curX=x;dragging.curY=y;render();}
function endDrag(x,y){
  if(!dragging)return;
  const obj=hitObject(x,y);
  const s=SENTENCES.find(s=>s.id===dragging.id);
  if(obj && !Object.values(connected).includes(obj.id)){
    if(obj.id===s.match){
      connected[s.id]=obj.id;correctCount++;
      if(correctCount===total){msgEl.innerHTML='🎉 !סוף ¡Uniste todo!';msgEl.className='msg win';launchConfetti();playWinSound();}
      else{msgEl.textContent='¡Muy bien!';msgEl.className='msg';}
    }else{
      msgEl.textContent='¡Intenta de nuevo!';msgEl.className='msg wrong';
      delete lineColors[s.id];colorIdx=Math.max(0,colorIdx-1);
    }
  }else{
    delete lineColors[s.id];colorIdx=Math.max(0,colorIdx-1);
  }
  dragging=null;render();
}
cv.addEventListener('mousedown',e=>{const p=getPos(e);startDrag(p.x,p.y);});
cv.addEventListener('mousemove',e=>{const p=getPos(e);moveDrag(p.x,p.y);});
cv.addEventListener('mouseup',e=>{const p=getPos(e);endDrag(p.x,p.y);});
cv.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);startDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const p=getPos(e);moveDrag(p.x,p.y);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();endDrag(t.clientX-rect.left,t.clientY-rect.top);},{passive:false});

function launchConfetti(){
  confettiPieces=[];
  for(let i=0;i<150;i++){
    confettiPieces.push({x:Math.random()*W,y:-20-Math.random()*H*0.5,w:8+Math.random()*8,h:4+Math.random()*4,
      color:['#e63030','#2eaa2e','#2255cc','#f57c00','#9c27b0','#f5c800','#f06090','#00bcd4'][Math.floor(Math.random()*8)],
      angle:Math.random()*360,spin:(Math.random()-0.5)*8,vx:(Math.random()-0.5)*4,vy:3+Math.random()*5,opacity:1});
  }
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  animateConfetti();
}
let confettiPieces=[],confettiAnim=null;
function animateConfetti(){
  cctx.clearRect(0,0,W,H);let alive=false;
  confettiPieces.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;if(p.y<H)alive=true;
    if(p.opacity>0&&p.y<H+20){cctx.save();cctx.globalAlpha=Math.max(0,p.opacity);
      cctx.translate(p.x,p.y);cctx.rotate(p.angle*Math.PI/180);
      cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore();}
  });
  if(alive)confettiAnim=requestAnimationFrame(animateConfetti);else cctx.clearRect(0,0,W,H);
}
function playWinSound(){
  try{const ac=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((freq,i)=>{const osc=ac.createOscillator();const gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0.3,ac.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.15+0.35);
      osc.start(ac.currentTime+i*0.15);osc.stop(ac.currentTime+i*0.15+0.35);});
  }catch(e){}
}

function resetGame(){
  connected={};lineColors={};dragging=null;colorIdx=0;correctCount=0;
  if(confettiAnim)cancelAnimationFrame(confettiAnim);cctx.clearRect(0,0,W,H);
  msgEl.textContent='Arrastra una línea desde cada oración hasta el objeto correcto';msgEl.className='msg';render();
}

bgImg.addEventListener('load',resize);
window.addEventListener('resize',resize);
if(bgImg.complete)resize();
</script>
